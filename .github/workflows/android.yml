name: Android release bundle

# Builds a signed Android App Bundle (.aab) for Google Play and publishes it to
# the Internal testing track. Two ways to publish (both need PLAY_SERVICE_ACCOUNT_JSON):
#   - push a tag like v0.1.0            → versionName = 0.1.0 → build + publish
#   - workflow_dispatch with publish=true → build + publish (no git tag needed);
#     versionName from the `version` input, or 0.0.0-<sha> if left blank
#   - workflow_dispatch with publish=false → throwaway build, never published
# So a release can be shipped with just:  gh workflow run android.yml -f publish=true -f version=0.1.2
# Signing secrets (repo → Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# Auto-publish secret (the publish step self-skips until it exists):
#   PLAY_SERVICE_ACCOUNT_JSON  (Play Developer API service-account key)
# The Internal testing track must already have one release (seeded manually) before
# the Play API can update it — it does (release 0.0.1, Jun 2026).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the build to Play Internal testing"
        type: boolean
        default: false
      version:
        description: "versionName (e.g. 0.1.2); blank → 0.0.0-<sha>"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    env:
      # Surfaced as env so the publish step's `if` can self-skip until the
      # secret is configured (you can't reference secrets directly in `if`).
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Web build with the relative base (BUILD_TARGET=app) + copy into android/.
      - run: npm run cap:sync

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4

      # Derive the version from the tag (fallback for manual runs).
      - name: Compute version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=${REF#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            echo "name=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "name=0.0.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          # versionCode = 1000 + run number, computed in shell: GitHub Actions
          # template expressions have no arithmetic operators, so doing the
          # addition in an expression is a syntax error that invalidates the
          # whole workflow file. (Keep the += out of any workflow expression,
          # including comments — templates are interpolated even inside run:.)
          echo "code=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_OUTPUT"

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Build signed release bundle
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
          # 1000 + run number → always-increasing and safely above the manual
          # versionCode 1 already uploaded to the Internal testing track.
          ANDROID_VERSION_CODE: ${{ steps.ver.outputs.code }}
        run: ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v6
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # --- Auto-publish to Google Play (Internal testing) ---
      # Publishes on a v* tag, or on a manual dispatch with publish=true. Requires
      # the PLAY_SERVICE_ACCOUNT_JSON secret and a track already seeded with one
      # release (the API can only update an existing track). Self-skips until the
      # secret exists, so builds stay green meanwhile.
      - name: Publish to Play (Internal testing)
        if: >-
          env.PLAY_SERVICE_ACCOUNT_JSON != '' &&
          ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
           (github.event_name == 'workflow_dispatch' && inputs.publish))
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.komapc.yaplikacija
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
