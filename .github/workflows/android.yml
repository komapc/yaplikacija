name: Android release bundle

# Builds a signed Android App Bundle (.aab) for Google Play, and — on a v* tag —
# auto-publishes it to the Internal testing track.
#   - push a tag like v0.1.0  → versionName = 0.1.0 → build + publish to internal
#   - run manually (workflow_dispatch) → throwaway build, never published
# Signing secrets (repo → Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# Auto-publish secret (optional — the publish step self-skips until it exists):
#   PLAY_SERVICE_ACCOUNT_JSON  (Play Developer API service-account key)
# The Internal testing track must already have one release (seeded manually with
# v0.1.0) before the Play API can update it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    env:
      # Surfaced as env so the publish step's `if` can self-skip until the
      # secret is configured (you can't reference secrets directly in `if`).
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Web build with the relative base (BUILD_TARGET=app) + copy into android/.
      - run: npm run cap:sync

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3

      # Derive the version from the tag (fallback for manual runs).
      - name: Compute version
        id: ver
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=${REF#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=0.0.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Build signed release bundle
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
          # 1000 + run number → always-increasing and safely above the manual
          # versionCode 1 already uploaded to the Internal testing track.
          ANDROID_VERSION_CODE: ${{ 1000 + github.run_number }}
        run: ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # --- Auto-publish to Google Play (Internal testing) ---
      # Runs ONLY on a v* tag, never on manual dispatch. Requires the
      # PLAY_SERVICE_ACCOUNT_JSON secret and a track already seeded with one
      # release (the API can only update an existing track). Self-skips until
      # the secret exists, so tag builds stay green meanwhile.
      - name: Publish to Play (Internal testing)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && env.PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.komapc.yaplikacija
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
