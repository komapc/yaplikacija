name: CI / Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request: # validate (typecheck + test + build) but do NOT deploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize per ref: a new push/PR update cancels its own older run, but a PR
# never cancels the main-branch deploy (different group).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck # type-checks src AND test/ (build only covers src)
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    # Only the main branch publishes; PRs run test+build for validation only.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
